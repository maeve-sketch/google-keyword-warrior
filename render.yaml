services:
  - type: web
    name: gkw-backend
    runtime: python
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GOOGLE_ADS_DEVELOPER_TOKEN
        sync: false
      - key: GOOGLE_ADS_LOGIN_CUSTOMER_ID
        sync: false
      - key: GOOGLE_ADS_CUSTOMER_ID
        sync: false
      - key: GOOGLE_ADS_SERVICE_ACCOUNT_JSON
        sync: false
      - key: SEARCH_CONSOLE_SITE_URL
        sync: false
      - key: SEARCH_CONSOLE_COUNTRY
        value: JPN
      - key: FRONTEND_URL
        sync: false
      - key: EXTRA_CORS_ORIGINS
        sync: false
